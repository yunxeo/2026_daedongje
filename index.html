<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>2026 대동제</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=SUIT:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f0f0f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'SUIT', sans-serif; }
  #root { width: 390px; height: 844px; background: white; border-radius: 40px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.25); position: relative; }
  @media (max-width: 430px) {
    body { background: white; align-items: flex-start; }
    #root { width: 100%; height: 100vh; border-radius: 0; box-shadow: none; }
  }
  @keyframes pulse { 0%,100%{opacity:0.6;transform:scale(1)} 50%{opacity:0.3;transform:scale(1.3)} }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
// ── Design Tokens ──
const DS = {
  colors: {
    primary:'#1e53ff', primaryPressed:'#153bb5', primarySubtle:'#e9eeff',
    secondaryA:'#7052ff', secondaryAPressed:'#503ab5', secondaryASubtle:'#f1eeff',
    secondaryB:'#ff40a5', secondaryBPressed:'#b52d75', secondaryBSubtle:'#ffecf6',
    error:'#ff5a36', errorPressed:'#b52e10', errorSubtle:'#fff0ec',
    warning:'#ffb020', warningSubtle:'#fff8e0',
    success:'#00c070', successSubtle:'#e0fff3',
    white:'#ffffff',
    gray50:'#edeef0', gray100:'#c7cad0', gray200:'#acb1ba', gray300:'#868d9a',
    gray400:'#6e7786', gray500:'#4a5568', gray600:'#434d5f', gray700:'#353c4a',
    gray800:'#292f39', gray900:'#1f242c',
    borderDefault:'#edeef0', borderStrong:'#c7cad0',
  },
  type: {
    display:  { fontSize:28, fontWeight:800, lineHeight:'120%', letterSpacing:'-0.02em' },
    heading1: { fontSize:24, fontWeight:700, lineHeight:'120%', letterSpacing:'-0.02em' },
    heading2: { fontSize:20, fontWeight:700, lineHeight:'130%', letterSpacing:'-0.02em' },
    heading3: { fontSize:17, fontWeight:600, lineHeight:'130%', letterSpacing:'-0.02em' },
    body1:    { fontSize:15, fontWeight:500, lineHeight:'150%', letterSpacing:'-0.02em' },
    body2:    { fontSize:14, fontWeight:400, lineHeight:'150%', letterSpacing:'-0.02em' },
    caption:  { fontSize:12, fontWeight:400, lineHeight:'150%', letterSpacing:'-0.02em' },
    label:    { fontSize:11, fontWeight:500, lineHeight:'150%', letterSpacing:'-0.02em' },
  },
  radius:{ sm:6, md:10, lg:14, xl:20, full:999 },
  shadow:{ sm:'0 1px 4px rgba(0,0,0,0.08)', md:'0 4px 16px rgba(0,0,0,0.10)', lg:'0 8px 32px rgba(0,0,0,0.12)' },
  font:"'SUIT', sans-serif",
};
const C = DS.colors, T = DS.type, R = DS.radius;

// ── Icons ──
function Icon({ name, size=20, color=C.gray900, style={} }) {
  const s = { width:size, height:size, flexShrink:0, ...style };
  const icons = {
    home: <svg viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" style={s}><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>,
    map: <svg viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" style={s}><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>,
    ticket: <svg viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" style={s}><path d="M2 9a1 1 0 011-1h1a2 2 0 100-4H3a1 1 0 01-1-1V4a1 1 0 011-1h18a1 1 0 011 1v1a1 1 0 01-1 1h-1a2 2 0 100 4h1a1 1 0 011 1v1a1 1 0 01-1 1H3a1 1 0 01-1-1V9z"/></svg>,
    bell: <svg viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" style={s}><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>,
    menu: <svg viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" style={s}><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>,
    close: <svg viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" style={s}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
    chevronRight: <svg viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" style={s}><polyline points="9 18 15 12 9 6"/></svg>,
    chevronDown: <svg viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" style={s}><polyline points="6 9 12 15 18 9"/></svg>,
    chevronLeft: <svg viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" style={s}><polyline points="15 18 9 12 15 6"/></svg>,
    search: <svg viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" style={s}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
    pin: <svg viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" style={s}><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>,
    clock: <svg viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" style={s}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
    star: <svg viewBox="0 0 24 24" fill={color} stroke={color} strokeWidth="1.2" style={s}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>,
    starEmpty: <svg viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" style={s}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>,
    info: <svg viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" style={s}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>,
    user: <svg viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" style={s}><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
    phone: <svg viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" style={s}><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.01 1.18 2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>,
    accessibility: <svg viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" style={s}><circle cx="12" cy="3" r="1.5" fill={color}/><path d="M5 8h14M12 8v13M8 21l4-5 4 5"/></svg>,
    filter: <svg viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" style={s}><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>,
    check: <svg viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.2" style={s}><polyline points="20 6 9 17 4 12"/></svg>,
    people: <svg viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" style={s}><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>,
    heart: <svg viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" style={s}><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>,
    arrowLeft: <svg viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" style={s}><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>,
    share: <svg viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" style={s}><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>,
    lost: <svg viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" style={s}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>,
    feedback: <svg viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" style={s}><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>,
    music: <svg viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" style={s}><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>,
    booth: <svg viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" style={s}><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/><line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/></svg>,
  };
  return icons[name] || <svg viewBox="0 0 24 24" style={s}><circle cx="12" cy="12" r="8" fill={color} opacity="0.3"/></svg>;
}

// ── Status Bar ──
function StatusBar({ dark=false }) {
  const col = dark ? '#fff' : C.gray900;
  return (
    <div style={{ height:44, display:'flex', alignItems:'center', justifyContent:'space-between', padding:'0 20px', background:'transparent' }}>
      <span style={{ fontFamily:DS.font, fontSize:13, fontWeight:600, color:col }}>9:41</span>
      <div style={{ display:'flex', gap:5, alignItems:'center' }}>
        <svg width="16" height="12" viewBox="0 0 16 12" fill={col}><rect x="0" y="4" width="3" height="8" rx="1"/><rect x="4.5" y="2.5" width="3" height="9.5" rx="1"/><rect x="9" y="1" width="3" height="11" rx="1"/><rect x="13.5" y="0" width="3" height="12" rx="1" opacity="0.3"/></svg>
        <svg width="15" height="12" viewBox="0 0 15 12" fill={col}><path d="M7.5 2.4C5.2 2.4 3.1 3.3 1.6 4.8L0 3.2C2 1.2 4.6 0 7.5 0s5.5 1.2 7.5 3.2l-1.6 1.6C11.9 3.3 9.8 2.4 7.5 2.4z" opacity="0.4"/><path d="M7.5 5.8C6 5.8 4.7 6.4 3.7 7.4L2.1 5.8C3.6 4.3 5.4 3.4 7.5 3.4s3.9.9 5.4 2.4l-1.6 1.6C10.3 6.4 9 5.8 7.5 5.8z"/><circle cx="7.5" cy="10" r="2"/></svg>
        <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke={col} strokeOpacity="0.35"/><rect x="2" y="2" width="16" height="8" rx="2" fill={col}/><path d="M23 4.5v3a2 2 0 000-3z" fill={col} opacity="0.4"/></svg>
      </div>
    </div>
  );
}

// ── Top Bar ──
function TopBar({ title, onBack, onSearch, onShare, dark=false, transparent=false }) {
  const bg = transparent ? 'transparent' : (dark ? C.gray900 : C.white);
  const col = dark || transparent ? C.white : C.gray900;
  return (
    <div style={{ height:56, display:'flex', alignItems:'center', padding:'0 4px', background:bg, borderBottom: transparent?'none':`1px solid ${C.borderDefault}` }}>
      {onBack && <button onClick={onBack} style={{ width:44,height:44,display:'flex',alignItems:'center',justifyContent:'center',background:'none',border:'none',cursor:'pointer' }}><Icon name="arrowLeft" color={col} size={22}/></button>}
      {!onBack && <div style={{ width:16 }}/>}
      <span style={{ flex:1, fontFamily:DS.font, fontSize:17, fontWeight:600, color:col, textAlign:onBack?'center':'left', padding:'0 8px' }}>{title}</span>
      <div style={{ display:'flex' }}>
        {onSearch && <button onClick={onSearch} style={{ width:44,height:44,display:'flex',alignItems:'center',justifyContent:'center',background:'none',border:'none',cursor:'pointer' }}><Icon name="search" color={col} size={22}/></button>}
        {onShare && <button onClick={onShare} style={{ width:44,height:44,display:'flex',alignItems:'center',justifyContent:'center',background:'none',border:'none',cursor:'pointer' }}><Icon name="share" color={col} size={22}/></button>}
        {!onSearch && !onShare && <div style={{ width:16 }}/>}
      </div>
    </div>
  );
}

// ── Nav Bar ──
function NavBar({ active='home', onChange }) {
  const items = [
    { key:'home', label:'홈', icon:'home' },
    { key:'booth', label:'부스', icon:'booth' },
    { key:'timetable', label:'공연', icon:'music' },
    { key:'reservation', label:'예약', icon:'ticket' },
    { key:'more', label:'더보기', icon:'menu' },
  ];
  return (
    <div style={{ height:80, background:C.white, borderTop:`1px solid ${C.borderDefault}`, display:'flex', alignItems:'flex-start', paddingTop:8, flexShrink:0 }}>
      {items.map(it => {
        const isActive = it.key === active;
        return (
          <button key={it.key} onClick={() => onChange?.(it.key)} style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:2, background:'none', border:'none', cursor:'pointer', padding:'2px 0' }}>
            <Icon name={it.icon} size={24} color={isActive ? C.primary : C.gray300}/>
            <span style={{ fontFamily:DS.font, fontSize:10, color:isActive ? C.primary : C.gray300 }}>{it.label}</span>
            {isActive && <div style={{ width:4, height:4, borderRadius:2, background:C.primary, marginTop:1 }}/>}
          </button>
        );
      })}
    </div>
  );
}

// ── Tab Bar ──
function TabBar({ tabs, active, onChange, style={} }) {
  return (
    <div style={{ display:'flex', borderBottom:`1px solid ${C.borderDefault}`, background:C.white, flexShrink:0, ...style }}>
      {tabs.map(tab => {
        const isActive = tab.key === active;
        return (
          <button key={tab.key} onClick={() => onChange?.(tab.key)} style={{ flex:1, height:44, display:'flex', alignItems:'center', justifyContent:'center', gap:4, background:'none', border:'none', borderBottom:isActive?`2px solid ${C.primary}`:'2px solid transparent', cursor:'pointer', padding:0 }}>
            <span style={{ fontFamily:DS.font, fontSize:14, color:isActive?C.primary:C.gray400, fontWeight:isActive?600:400 }}>{tab.label}</span>
            {tab.count != null && <span style={{ fontFamily:DS.font, fontSize:11, background:isActive?C.primarySubtle:C.gray50, color:isActive?C.primary:C.gray400, padding:'1px 6px', borderRadius:R.full }}>{tab.count}</span>}
          </button>
        );
      })}
    </div>
  );
}

// ── Chip ──
function Chip({ label, active, onClick, color }) {
  const bg = active ? (color || C.primary) : C.gray50;
  const fg = active ? C.white : C.gray500;
  return (
    <button onClick={onClick} style={{ padding:'6px 14px', borderRadius:R.full, background:bg, border:'none', cursor:'pointer', fontFamily:DS.font, fontSize:13, color:fg, whiteSpace:'nowrap', fontWeight:active?600:400 }}>{label}</button>
  );
}

// ── Badge ──
function Badge({ label, variant='primary', size='md' }) {
  const variants = {
    primary:{ bg:C.primarySubtle, color:C.primary },
    secondary:{ bg:C.secondaryASubtle, color:C.secondaryA },
    pink:{ bg:C.secondaryBSubtle, color:C.secondaryB },
    error:{ bg:C.errorSubtle, color:C.error },
    warning:{ bg:C.warningSubtle, color:C.warning },
    success:{ bg:C.successSubtle, color:C.success },
    gray:{ bg:C.gray50, color:C.gray500 },
  };
  const v = variants[variant] || variants.primary;
  const sz = size==='sm' ? { padding:'2px 8px', fontSize:11 } : { padding:'4px 10px', fontSize:12 };
  return <span style={{ fontFamily:DS.font, ...sz, borderRadius:R.full, background:v.bg, color:v.color, fontWeight:600 }}>{label}</span>;
}

// ── Button ──
function Btn({ label, variant='primary', size='md', icon, fullWidth, onClick, disabled }) {
  const variants = {
    primary:{ bg:C.primary, color:C.white, border:'none' },
    secondary:{ bg:C.secondaryA, color:C.white, border:'none' },
    outline:{ bg:'transparent', color:C.primary, border:`1.5px solid ${C.primary}` },
    ghost:{ bg:C.gray50, color:C.gray700, border:'none' },
    danger:{ bg:C.error, color:C.white, border:'none' },
  };
  const sizes = {
    sm:{ height:36, padding:'0 14px', fontSize:13, borderRadius:R.sm },
    md:{ height:48, padding:'0 20px', fontSize:15, borderRadius:R.md },
    lg:{ height:56, padding:'0 24px', fontSize:16, borderRadius:R.md },
  };
  const v = variants[variant] || variants.primary;
  const sz = sizes[size] || sizes.md;
  return (
    <button onClick={onClick} disabled={disabled} style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:6, background:v.bg, color:v.color, border:v.border||'none', borderRadius:sz.borderRadius, height:sz.height, padding:sz.padding, fontFamily:DS.font, fontSize:sz.fontSize, fontWeight:600, letterSpacing:'-0.02em', cursor:disabled?'not-allowed':'pointer', width:fullWidth?'100%':'auto', opacity:disabled?0.5:1, boxSizing:'border-box' }}>
      {icon && <Icon name={icon} size={18} color={v.color}/>}
      {label}
    </button>
  );
}

// ── LocationChip ──
function LocationChip({ location }) {
  const colors = { '백양로':{ bg:C.primarySubtle, color:C.primary }, '한글탑':{ bg:C.secondaryASubtle, color:C.secondaryA }, '노천극장':{ bg:C.secondaryBSubtle, color:C.secondaryB } };
  const s = colors[location] || { bg:C.gray50, color:C.gray500 };
  return <span style={{ fontFamily:DS.font, padding:'3px 8px', borderRadius:R.full, background:s.bg, color:s.color, fontWeight:600, fontSize:11 }}>{location}</span>;
}

// ── WaitBar ──
function WaitBar({ current, total, label }) {
  const pct = Math.min(100, (current/total)*100);
  const color = pct>80 ? C.error : pct>50 ? C.warning : C.success;
  return (
    <div style={{ padding:'12px 16px', background:C.white, borderRadius:R.md, border:`1px solid ${C.borderDefault}` }}>
      <div style={{ display:'flex', justifyContent:'space-between', marginBottom:8 }}>
        <span style={{ fontFamily:DS.font, fontSize:14, color:C.gray600 }}>{label||'현재 대기'}</span>
        <span style={{ fontFamily:DS.font, fontSize:15, fontWeight:700, color }}>{current}팀</span>
      </div>
      <div style={{ height:8, background:C.gray50, borderRadius:R.full, overflow:'hidden' }}>
        <div style={{ height:'100%', width:`${pct}%`, background:color, borderRadius:R.full, transition:'width 0.3s' }}/>
      </div>
    </div>
  );
}

// ── Divider ──
function Divider({ label }) {
  return (
    <div style={{ height:8, background:C.gray50, borderTop:`1px solid ${C.borderDefault}`, borderBottom:`1px solid ${C.borderDefault}`, display:'flex', alignItems:'center', padding:'0 16px', flexShrink:0 }}>
      {label && <span style={{ fontFamily:DS.font, fontSize:12, color:C.gray400, fontWeight:600 }}>{label}</span>}
    </div>
  );
}

// ── SectionHeader ──
function SectionHeader({ title, action, actionLabel='전체보기' }) {
  return (
    <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'20px 16px 12px' }}>
      <span style={{ fontFamily:DS.font, fontSize:17, fontWeight:600, color:C.gray900 }}>{title}</span>
      {action && <button onClick={action} style={{ background:'none', border:'none', cursor:'pointer', fontFamily:DS.font, fontSize:12, color:C.gray400, display:'flex', alignItems:'center', gap:2 }}>{actionLabel}<Icon name="chevronRight" size={14} color={C.gray400}/></button>}
    </div>
  );
}

// ── NoticeItem ──
function NoticeItem({ title, date, isNew, onClick }) {
  return (
    <div onClick={onClick} style={{ padding:'16px', borderBottom:`1px solid ${C.borderDefault}`, cursor:'pointer', background:C.white }}>
      <div style={{ display:'flex', alignItems:'flex-start', gap:8 }}>
        {isNew && <Badge label="NEW" variant="primary" size="sm"/>}
        <span style={{ fontFamily:DS.font, fontSize:15, color:C.gray900, flex:1, lineHeight:'150%' }}>{title}</span>
        <Icon name="chevronRight" size={16} color={C.gray300} style={{ marginTop:2, flexShrink:0 }}/>
      </div>
      <span style={{ fontFamily:DS.font, fontSize:12, color:C.gray300, marginTop:4, display:'block' }}>{date}</span>
    </div>
  );
}

// ── Input ──
function Input({ placeholder, value, onChange, icon, type='text' }) {
  return (
    <div style={{ display:'flex', alignItems:'center', gap:8, background:C.gray50, borderRadius:R.md, padding:'0 12px', border:`1.5px solid ${C.borderDefault}` }}>
      {icon && <Icon name={icon} size={18} color={C.gray300}/>}
      <input type={type} placeholder={placeholder} value={value} onChange={e => onChange?.(e.target.value)} style={{ flex:1, height:44, background:'none', border:'none', outline:'none', fontFamily:DS.font, fontSize:15, color:C.gray900 }}/>
    </div>
  );
}

// ── Dropdown ──
function Dropdown({ label, options, value, onChange }) {
  const [open, setOpen] = React.useState(false);
  const selected = options.find(o => o.value===value) || options[0];
  return (
    <div style={{ position:'relative' }}>
      <button onClick={() => setOpen(!open)} style={{ display:'flex', alignItems:'center', gap:6, padding:'8px 12px', background:C.white, border:`1.5px solid ${open?C.primary:C.borderStrong}`, borderRadius:R.md, cursor:'pointer', fontFamily:DS.font, fontSize:14, color:C.gray700, minWidth:110 }}>
        <span style={{ flex:1, textAlign:'left' }}>{selected?.label||label}</span>
        <Icon name="chevronDown" size={16} color={C.gray400}/>
      </button>
      {open && (
        <div style={{ position:'absolute', top:'100%', left:0, right:0, background:C.white, border:`1.5px solid ${C.primary}`, borderRadius:R.md, boxShadow:DS.shadow.md, zIndex:100, marginTop:4, overflow:'hidden' }}>
          {options.map(o => (
            <button key={o.value} onClick={() => { onChange?.(o.value); setOpen(false); }} style={{ display:'block', width:'100%', textAlign:'left', padding:'10px 12px', background:o.value===value?C.primarySubtle:C.white, border:'none', cursor:'pointer', fontFamily:DS.font, fontSize:14, color:o.value===value?C.primary:C.gray700, fontWeight:o.value===value?600:400 }}>
              {o.label}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

// ── FilterSheet ──
function FilterSheet({ open, onClose, onApply }) {
  const [cat, setCat] = React.useState([]);
  const [days, setDays] = React.useState([]);
  const [loc, setLoc] = React.useState([]);
  const toggle = (arr, setArr, v) => setArr(prev => prev.includes(v) ? prev.filter(x=>x!==v) : [...prev,v]);
  const ChipSel = ({ label, active, onClick }) => (
    <button onClick={onClick} style={{ padding:'8px 16px', borderRadius:R.full, background:active?C.primary:C.gray50, border:`1.5px solid ${active?C.primary:C.borderDefault}`, color:active?C.white:C.gray700, fontFamily:DS.font, fontSize:13, fontWeight:active?600:400, cursor:'pointer' }}>{label}</button>
  );
  if (!open) return null;
  return (
    <div style={{ position:'absolute', inset:0, zIndex:200 }}>
      <div onClick={onClose} style={{ position:'absolute', inset:0, background:'rgba(0,0,0,0.4)' }}/>
      <div style={{ position:'absolute', bottom:0, left:0, right:0, background:C.white, borderRadius:`${R.xl}px ${R.xl}px 0 0`, padding:'0 0 32px' }}>
        <div style={{ width:40, height:4, borderRadius:2, background:C.gray100, margin:'12px auto 20px' }}/>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'0 20px 16px' }}>
          <span style={{ fontFamily:DS.font, fontSize:17, fontWeight:600, color:C.gray900 }}>필터</span>
          <button onClick={() => { setCat([]); setDays([]); setLoc([]); }} style={{ background:'none', border:'none', cursor:'pointer', fontFamily:DS.font, fontSize:12, color:C.gray400 }}>초기화</button>
        </div>
        {[
          { label:'카테고리', options:['음식','공예','게임','체험','포토','굿즈'], state:cat, set:setCat },
          { label:'요일', options:['수','목','금'], state:days, set:setDays },
          { label:'위치', options:['백양로','한글탑','노천극장','학생회관'], state:loc, set:setLoc },
        ].map(section => (
          <div key={section.label} style={{ padding:'12px 20px', borderTop:`1px solid ${C.borderDefault}` }}>
            <div style={{ fontFamily:DS.font, fontSize:14, fontWeight:600, color:C.gray700, marginBottom:10 }}>{section.label}</div>
            <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
              {section.options.map(o => <ChipSel key={o} label={o} active={section.state.includes(o)} onClick={() => toggle(section.state, section.set, o)}/>)}
            </div>
          </div>
        ))}
        <div style={{ padding:'16px 20px 0' }}>
          <Btn label="부스 보기" variant="primary" size="lg" fullWidth onClick={() => { onApply?.({cat,days,loc}); onClose?.(); }}/>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [screen, setScreen] = React.useState('home');
  const [history, setHistory] = React.useState(['home']);

  const navigate = (key) => {
    setScreen(key);
    setHistory(h => [...h, key]);
  };

  const goBack = () => {
    setHistory(h => {
      const next = h.slice(0,-1);
      setScreen(next[next.length-1] || 'home');
      return next.length ? next : ['home'];
    });
  };

  const screens = {
    home: <HomeScreen onNav={navigate}/>,
    booth: <BoothListScreen onNav={navigate}/>,
    boothDetail: <BoothDetailScreen onBack={goBack}/>,
    timetable: <TimetableScreen onNav={navigate}/>,
    performanceDetail: <PerformanceDetailScreen onBack={goBack}/>,
    map: <MapScreen onNav={navigate}/>,
    reservation: <ReservationScreen onNav={navigate}/>,
    menu: <MenuDrawerScreen onClose={goBack} onNav={navigate}/>,
    more: <MenuDrawerScreen onClose={goBack} onNav={navigate}/>,
    notice: <NoticeScreen onNav={navigate}/>,
    lost: <LostScreen onNav={navigate}/>,
    barrier: <BarrierScreen onNav={navigate}/>,
    feedback: <FeedbackScreen onBack={goBack}/>,
    credits: <CreditsScreen onBack={goBack}/>,
    contact: <ContactScreen onBack={goBack}/>,
  };

  return (
    <div style={{ width:'100%', height:'100%', display:'flex', flexDirection:'column', overflow:'hidden' }}>
      {screens[screen] || screens.home}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
